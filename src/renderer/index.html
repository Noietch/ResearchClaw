<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResearchClaw</title>
    <style>
      /* Initial loading screen styles */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f7f7f5;
        font-family:
          Inter,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        z-index: 9999;
      }
      #initial-loader .logo {
        width: 48px;
        height: 48px;
        margin-bottom: 24px;
        animation: logo-fade-in 0.4s ease-out;
      }
      #initial-loader .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #e8e8e5;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #initial-loader .text {
        margin-top: 16px;
        color: #9b9a97;
        font-size: 13px;
        animation: text-fade-in 0.4s ease-out 0.2s both;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes logo-fade-in {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes text-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <img class="logo" src="icon.png" alt="ResearchClaw" />
        <div class="spinner"></div>
        <div class="text">Loading...</div>
      </div>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
